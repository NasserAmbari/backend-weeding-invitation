name: Deploy Wedding API Production

# Kapan skrip ini dijalankan?
on:
  push:
    branches:
      - main # Hanya jalan ketika ada perubahan yang di-push ke branch 'main'

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest # Robot GitHub berjalan di OS Ubuntu

    steps:
      - name: Eksekusi Perintah Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # 1. Load NVM secara manual untuk Non-Interactive Shell
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 2. Pindah ke folder project
            cd /home/weeding-project/backend-weeding-invitation

            # 3. Eksekusi CI/CD
            git pull origin main
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 reload wedding-api
